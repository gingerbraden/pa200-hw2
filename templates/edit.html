{% extends "base.html" %}
{% block title %}Edit Task — Taskboard{% endblock %}

{% block content %}
<div class="layout layout-single">
  <div class="panel panel-add">
    <h2 class="panel-title">Edit Task</h2>
    <form action="{{ url_for('edit_todo', todo_id=todo.id) }}" method="POST" class="add-form">
      <div class="field">
        <label for="title">Task title</label>
        <input type="text" id="title" name="title" value="{{ todo.title }}" required maxlength="200" />
      </div>
      <div class="field">
        <label for="description">Notes <span class="optional">(optional)</span></label>
        <textarea id="description" name="description" rows="3">{{ todo.description or '' }}</textarea>
      </div>
      <div class="field">
        <label>Priority</label>
        <div class="priority-group">
          {% for p in ['low', 'medium', 'high'] %}
          <label class="prio-opt prio-{{ p }}">
            <input type="radio" name="priority" value="{{ p }}" {% if todo.priority == p %}checked{% endif %} />
            {{ p|capitalize }}
          </label>
          {% endfor %}
        </div>
      </div>
      <div class="btn-row">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('index') }}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
